# ══════════════════════════════════════════════════
# NutriPulse — Nginx Reverse Proxy
# ══════════════════════════════════════════════════

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

upstream flask_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

# ─── HTTP → Redirect to HTTPS ─────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN_HERE;

    # Let's Encrypt verification (Certbot needs this)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN_HERE;

    # SSL Certificate (filled in by Certbot automatically)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ─── Logging ──────────────────────────────────
    access_log  /var/log/nginx/nutripulse_access.log;
    error_log   /var/log/nginx/nutripulse_error.log;

    # ─── Security Headers ─────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── CORS ─────────────────────────────────────
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    if ($request_method = 'OPTIONS') { return 204; }

    # ─── API Routes → Flask ───────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass         http://flask_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Connection "";
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    # ─── Legacy Auth Routes → Flask ───────────────
    location ~ ^/(login|register)(\.php)?$ {
        proxy_pass         http://flask_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # ─── Static Files ─────────────────────────────
    location / {
        root  /home/ubuntu/calorie-pwa;
        index index.html;
        try_files $uri $uri/ /index.html;

        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|webmanifest|json)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─── Block Sensitive Files ─────────────────────
    location ~* \.(py|db|sql|env|sqlite|key)$ {
        deny all;
        return 403;
    }

    # ─── Service Worker (never cache) ─────────────
    location = /sw.js {
        root /home/ubuntu/calorie-pwa;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }
}