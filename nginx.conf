# ══════════════════════════════════════════════════
# NutriPulse — Nginx Reverse Proxy / API Gateway
# Place this in your XAMPP or standalone Nginx config
# ══════════════════════════════════════════════════

# Rate limiting zone: 10 requests/second per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

upstream flask_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen       80;
    server_name  localhost;

    # ─── Logging ──────────────────────────────
    access_log  logs/nutripulse_access.log;
    error_log   logs/nutripulse_error.log;

    # ─── Security Headers ─────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── CORS Policy ─────────────────────────
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

    # Handle preflight
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # ─── API Routes → Flask ───────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://flask_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    # Legacy auth routes → Flask
    location ~ ^/(login|register)(\.php)?$ {
        proxy_pass         http://flask_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── Static Files (served by Nginx directly) ─
    location / {
        root   /path/to/calorie-pwa;  # UPDATE THIS PATH
        index  index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|webmanifest|json)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─── Block sensitive files ────────────────
    location ~* \.(py|db|sql|env|sqlite)$ {
        deny all;
        return 403;
    }

    # ─── Service Worker (no cache) ────────────
    location = /sw.js {
        root /path/to/calorie-pwa;  # UPDATE THIS PATH
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }
}

